version: '3.8'

services:
  study-agent:
    build: .
    container_name: study-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-study-agent-secret-key-change-in-production}
      - FLASK_ENV=production
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
